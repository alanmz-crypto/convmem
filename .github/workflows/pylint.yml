name: Pylint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Need base SHA history to read ci/pylint-baseline.json from PR base.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Regenerate ci/pylint-baseline.json on ubuntu-latest with the same
      # install steps (requirements + pylint==4.0.6 + pytest). Do not use a
      # local env that adds stray packages or scripts/__init__.py package marks.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint==4.0.6 pytest

      - name: Run Pylint (JSON report)
        id: pylint_run
        run: |
          # Capture the report even when pylint exits non-zero for preexisting debt.
          # Do not use pylint --exit-zero; the regression gate owns pass/fail.
          set +e
          pylint $(git ls-files "*.py") --output-format=json > pylint-report.json
          pylint_status=$?
          set -e
          echo "pylint_exit=$pylint_status"
          echo "pylint_status=$pylint_status" >> "$GITHUB_OUTPUT"
          test -s pylint-report.json

      - name: Pylint regression gate
        env:
          PYLINT_STATUS: ${{ steps.pylint_run.outputs.pylint_status }}
          # PR checks: base.sha. Push to main: event.before (prior tip).
          BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          # Live findings and any baseline edit are compared against BASE_REF.
          # Null / empty before (branch creation) must fail closed — never bootstrap.
          if [ -z "${BASE_REF}" ] || [ "${BASE_REF}" = "0000000000000000000000000000000000000000" ]; then
            echo "Baseline resolution FAIL: BASE_REF missing or null OID"
            exit 1
          fi
          python scripts/pylint_regression_gate.py ci \
            --report pylint-report.json \
            --pylint-status "${PYLINT_STATUS}" \
            --branch-baseline ci/pylint-baseline.json \
            --base-ref "${BASE_REF}"

      - name: Upload Pylint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report
          path: pylint-report.json
          if-no-files-found: ignore
