[sources]
paths = [
  "~/.local/share/kiro-cli/data.sqlite3",
  "~/.kiro/sessions",
  "~/.codex/history.jsonl",
  "~/.codex/sessions",
  "~/.copilot/session-state",
  "~/.config/cursor/chats",
  "~/.cursor/projects",
  "~/.continue/sessions",
  "~/.local/share/convmem/imports/webui.db",
]
inventory = "~/.local/share/convmem/inventory.jsonl"

# Crush: discovered via **/.crush/crush.db under $HOME (see docs/F2c-CRUSH-ADAPTER.md).
# kiro-cli 2.x transcripts: ~/.kiro/sessions/**/sess_*/messages.jsonl (see docs/KIRO-SESSION-ADAPTER.md).
# Legacy kiro-cli sqlite: snapshot via scripts/index-kiro-cli-snapshot.sh — do not watch live DB.
# Codex: ~/.codex/history.jsonl is user prompts only (source_type=prompt_only).
# Copilot CLI: ~/.copilot/session-state/<uuid>/events.jsonl (see docs/COPILOT-SESSION-ADAPTER.md).
#   Do not watch ~/.copilot/session-store.db or per-session session.db (live DBs).
# Re-run `python inventory.py` after adding new Crush project dirs.

[index]
chroma_dir    = "~/.local/share/convmem/chroma"
processed_log = "~/.local/share/convmem/processed.json"
units_export  = "~/.local/share/convmem/knowledge_units.jsonl"
chunk_size    = 60
chunk_overlap = 10

[models]
embed_model       = "nomic-embed-text"
summarize_model   = "llama3.1:8b"
distill_model     = "deepseek-v4-flash"
ollama_host       = "http://localhost:11434"
rerank_model      = "BAAI/bge-reranker-v2-m3"
deepseek_base_url = "https://api.deepseek.com"

[distill]
min_confidence = 0.6

[domains]
# Extra dotted-path domains beyond domains.py:DEFAULT_DOMAINS that you don't
# want flagged as drift in `convmem stats`. Domains are never rejected —
# this only silences the "not in taxonomy" warning for ones you've chosen.
allow_extra = []

[query]
top_k_candidates = 20
top_k_results    = 5
semantic_rank_weight = 2.0  # weighted RRF preserves broad semantic/lexical recall
rerank_rank_weight   = 1.0  # CrossEncoder is mandatory but not the sole signal
recency_weight   = 0.1  # time-decay boost for newer knowledge units (search + ask --evidence)
recency_half_life_days = 30
source_trust_weight = 1.0  # prefer steering, ledger, and inter-model sources after fusion

[watch]
debounce_seconds = 90
# Optional: override [sources].paths for watch only (defaults to sources.paths)
# Optional: append repo coordination docs without replacing transcript roots
# extra_paths = [
#   "~/Projects/convmem/docs/inter-model",
# ]
# paths = [
#   "~/.config/cursor/chats",
#   "~/.cursor/projects",
#   "~/Projects/convmem/docs/inter-model",
# ]

[refine]
enabled = true
batch_size = 10
interval_seconds = 300
# semantic_dedupe is optional: omit from jobs while dedupe_queue backlog is at/above
# queue_max_depth (restore F1 "job out while backlog" policy). Refine pauses the job
# at depth; ingest also refuses new semantic appends at the same total-line depth.
jobs = ["chroma_dedupe", "ledger_link", "confidence_audit"]
# Include "semantic_dedupe" only when intentionally filling an empty/shallow queue.
# backfill_domain — add back if a large untagged legacy intake appears
untagged_priority = true
# Total JSONL lines (pending + resolved). Example default 100; some live hosts use 200.
queue_max_depth = 100
dedupe_similarity = 0.92
min_confidence_redistill = 0.6

[refine.cost]
backfill_domain_calls_per_hour = 60
redistill_calls_per_hour = 15
semantic_dedupe_calls_per_hour = 20

[ingest_dedup]
# Exact canonical text duplicates are suppressed and audited. Semantic matches
# are indexed normally and queued for review; they are never auto-suppressed.
semantic_similarity = 0.92
candidate_k = 10
max_semantic_candidates_per_unit = 3

[eval]
# Pass thresholds for scripts/eval-*.py (see docs plan "Model quality eval harness").
retrieval_p_at_1_min  = 0.5
summary_structural_min = 0.8
synthesis_pass_min    = 0.8
# Doctor summarization canary (doctor.py:_check_summarization_canary):
# max wall-clock for one llama3.1:8b summarize before flagging (proxy for a
# silent GPU->CPU fallback / contention). Pin to normal GPU-path timing.
canary_latency_ms_max = 15000
